services:
  postgres:
    image: postgres:18-alpine
    container_name: pennyledger-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pennyledger}
      POSTGRES_USER: ${POSTGRES_USER:-pennyledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pennyledger}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
